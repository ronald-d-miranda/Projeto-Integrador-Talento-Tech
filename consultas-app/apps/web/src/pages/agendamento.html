<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendar Consulta</title>
    <link rel="stylesheet" href="styles/agendamento.css">
    <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="img/logo.png" alt="Logo">
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Início</a></li>
                <li><a href="#">Consultas</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container">
        <div class="header">
            <h1>Agendamento de Consulta</h1>
            <p>Preencha os campos abaixo para agendar sua consulta.</p>
        </div>

        <form action="../../../../../agendar_consulta.php" method="post">
            <div class="form-columns">
                <div class="form-section">
                    <fieldset>
                        <legend>Informações da Consulta</legend>
                        <div class="grid">
                            <!-- campos de especialidade, médico, data e hora -->
                            <div>
                                <label for="especialidade">Especialidade</label>
                                <select id="especialidade" name="especialidade" required class="form-control">
                                    <option value="">Selecione</option>
                                    <option value="clínico geral">Clínico Geral</option>
                                    <option value="dermatologia">Dermatologia</option>
                                    <option value="cardiologia">Cardiologia</option>
                                </select>
                            </div>
                            <div>
                                <label for="medico">Médico</label>
                                <select id="medico" name="medico" required class="form-control">
                                    <option value="">Selecione</option>
                                    <option value="Dr. João Silva">Dr. João Silva</option>
                                    <option value="Dra. Marina Costa">Dra. Marina Costa</option>
                                    <option value="Dr. Pedro Alves">Dr. Pedro Alves</option>
                                </select>
                            </div>
                            <div>
                                <label for="data">Data</label>
                                <input type="date" id="data" name="data" required class="form-control">
                            </div>
                            <div>
                                <label for="hora">Horário</label>
                                <input type="time" id="hora" name="horario" required class="form-control">
                            </div>
                        </div>
                    </fieldset>
                </div>

                <div class="form-section">
                    <fieldset>
                        <legend>Dados do Paciente</legend>
                        <div class="grid">
                            <!-- campos de nome, email, telefone e convênio -->

                            <div>
                                <label for="nome">Nome Completo</label>
                                <input type="text" id="nome" name="nome" required class="form-control">
                            </div>
                            <div>
                                <label for="email">E-mail</label>
                                <input type="email" id="email" name="email" required class="form-control">
                            </div>
                            <div>
                                <label for="telefone">Telefone</label>
                                <input type="tel" id="telefone" name="telefone" required class="form-control">
                            </div>
                            <div>
                                <label for="convenio">Convênio</label>
                                <input type="text" id="convenio" name="convenio" class="form-control">
                            </div>
                        </div>
                    </fieldset>
                </div>
            </div>

            <div style="margin-top: 20px; text-align: center;">
                <button type="submit" class="btn">Agendar Consulta</button>
            </div>
        </form>

    </div>

    <!-- Rodapé -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 Clínica Saúde Mais. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>

</html>
